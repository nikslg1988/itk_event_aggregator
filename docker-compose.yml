services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: events_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d events_db"]
      interval: 5s
      timeout: 5s
      retries: 5
  #app:
    #build: .
    #environment:
      #DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/events_db
    #ports:
    #  - "8000:8000"
    #depends_on:
      #db:
        #condition: service_healthy
volumes:
  postgres_data: